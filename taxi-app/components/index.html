<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>AeroTaxi Tenerife</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body>

        <!--NavBar-->
        <nav class="navbar navbar-expand-lg navbar-light bg-warning shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                    <img src="../images/logo.png" alt="Logo AeroTaxi Tenerife" width="40" height="40" class="me-2">
                    AeroTaxi Tenerife
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto"> <a class="nav-link active" aria-current="page" href="index.html">Inicio</a>
                        <a class="nav-link" href="#">Puntos de encuentro</a>
                        <a class="nav-link" href="./booking.html">Formulario de reserva</a>
                        <a class="nav-link" href="#">Horarios</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container text-center mt-4 mb-5 image-background position-relative">
            <h1 class="text_tittle">AeroTaxi Tenerife</h1>
            <h4 class="text_tittle">Rápido, cómodo y siempre a tiempo</h4>

            <div class="card p-4 shadow-lg bg-light position-absolute start-50 translate-middle m-5" style="top: 60%; width: 90%; max-width: 1000px; border: 15px solid #ffc107;">
                <form>
                    <div class="row g-3">
                        <div class="col-md-2 text-start">
                            <label for="origen" class="form-label fw-bold">Origen</label>
                            <input type="text" class="form-control" id="origen" placeholder="Aeropuerto">
                        </div>
                        <div class="col-md-2 text-start">
                            <label for="destino" class="form-label fw-bold">Destino</label>
                            <input type="text" class="form-control" id="destino" placeholder="Ciudad">
                        </div>
                        <div class="col-md-2 text-start">
                            <label for="personas" class="form-label fw-bold">Personas</label>
                            <input type="number" class="form-control" id="personas" min="1" value="1">
                        </div>
                        <div class="col-md-2 text-start">
                            <label for="fecha" class="form-label fw-bold">Fecha</label>
                            <input type="date" class="form-control" id="fecha">
                        </div>
                        <div class="col-md-2 text-start">
                            <label for="hora" class="form-label fw-bold">Hora</label>
                            <input type="time" class="form-control" id="hora">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-warning fw-bold mt-2">Reservar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>


        
    </body>

</html>
